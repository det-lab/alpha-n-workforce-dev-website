- name: "James deBoer"
  title: "Associate Research Professor"
  institution: "University of Notre Dame"
  bio: "Richard deBoer earned his Ph.D. from Notre Dame in 2011 and conducts research on nuclear reaction rates of light nuclei important for understanding energy production and element creation in stars. He specializes in connecting nuclear reaction theory with experimental measurements and serves as a consultant for the International Atomic Energy Agency."
  email: "Richard.J.deBoer.12@nd.edu"
  photo: "/assets/images/deboer-james.jpg"

- name: "Amy Roberts"
  title: "Assistant Professor"
  institution: "University of Colorado Denver"
  bio: "Dr. Roberts investigates energy deposition in low-threshold detectors and develops software solutions for nuclear physics communities. She is a member of the Cryogenic Dark Matter Search collaboration, which uses highly-sensitive phonon detectors to search for dark matter particles hypothesized to comprise 80% of the universe's mass."
  email: "amy.roberts@ucdenver.edu"
  photo: "/assets/images/roberts-amy.jpg"

- name: "Anthony Villano"
  title: "Assistant Professor"
  institution: "University of Colorado Denver"
  bio: "Dr. Villano is a first-generation physicist focused on detector development for fundamental physics, particularly dark matter research. His work with the SuperCDMS collaboration emphasizes low-energy recoils in cryogenic semiconductor detectors and data analysis for experiments with minimal background signals."
  email: "anthony.villano@ucdenver.edu"
  photo: "/assets/images/villano-anthony.jpg"

- name: "Felicite Noubissi Kamdem"
  title: "Assistant Professor"
  institution: "Jackson State University"
  bio: "Dr. Noubissi Kamdem holds dual Ph.D.s in Genetics and Molecular Biology from Jawaharlal Nehru University (India) and Biochemistry from the University of Yaounde-I (Cameroon). Her research focuses on mechanisms by which the Wnt/β-catenin signaling pathway promotes tumorigenesis and the cross-talk between Wnt and Hedgehog signaling pathways in cancer development and metastasis."
  email: "j00793930@jsums.edu"
  photo: "/assets/images/noubissi-kamdem-felicite.jpg"

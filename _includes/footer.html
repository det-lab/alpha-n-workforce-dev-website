  <div class="container footer-inner">
    <div class="footer-col">
      <h3>{{ site.title }}</h3>
      <p>{{ site.description }}</p>
    </div>
    <div class="footer-col">
      <h4>Navigate</h4>
      <ul>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/students/' | relative_url }}">Students</a></li>
        <li><a href="{{ '/resources/' | relative_url }}">Resources</a></li>
        <li><a href="{{ '/staff/' | relative_url }}">Staff</a></li>

    </div>

      <h4>About</h4>
      <p>This site is supported by grant funding. Content is updated each program year.</p>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="container">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    </div>
  </div>
